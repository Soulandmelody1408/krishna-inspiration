<!DOCTYPE html>
<html>
<head>
<title>Krishna Inspiration</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Krishna Inspiration</h1>

<p id="quote">
Krishna fills my heart with peace and guides me on the path of love.
</p>

<button onclick="newQuote()">
Give Me Another Inspiration
</button>

<script>
const quotes = [
"Krishna says: Do your duty without expecting rewards.",
"The soul is eternal; only the body changes.",
"Peace comes from within.",
"Love all beings equally.",
"Faith turns obstacles into opportunities.",
"Every moment is a chance to begin again."
];

function newQuote() {
const random = Math.floor(Math.random() * quotes.length);
document.getElementById("quote").innerHTML = quotes[random];
}
</script>

</body>
</html>
